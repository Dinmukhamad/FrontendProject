services:
  - type: web
    name: prestige-motors
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: prestige-motors-db
          property: connectionString
      - key: FLASK_DEBUG
        value: False

databases:
  - name: prestige-motors-db
    plan: free
